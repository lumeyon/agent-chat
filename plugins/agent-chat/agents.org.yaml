topology: org
description: AI subgraph for the org cohort — 10 AI agents arranged in the petersen graph, identical to agents.petersen.yaml's structure. Humans are no longer declared here; they live in agents.users.yaml and overlay onto every topology automatically via loadTopology's merge (multi-user transparency refactor). After the overlay, loadTopology("org") yields 12 agents and 36 edges identical to the pre-refactor "humans-as-agents" shape — backward compatible. The org topology now exists primarily for the comment-block and as a sentinel name; pragmatically, agents.petersen.yaml + agents.users.yaml produce the same merged graph.
agents:
  - orion
  - lumeyon
  - lyra
  - keystone
  - sentinel
  - vanguard
  - carina
  - pulsar
  - cadence
  - rhino
edges:
  # AI × AI petersen (15) — verbatim from agents.petersen.yaml.
  # Human × AI and human × human edges are derived at runtime via
  # loadTopology's overlay against agents.users.yaml — no longer
  # duplicated here.
  - [orion, lumeyon]
  - [lumeyon, sentinel]
  - [sentinel, vanguard]
  - [vanguard, keystone]
  - [keystone, orion]
  - [orion, carina]
  - [lumeyon, lyra]
  - [sentinel, pulsar]
  - [vanguard, cadence]
  - [keystone, rhino]
  - [carina, pulsar]
  - [pulsar, rhino]
  - [rhino, lyra]
  - [lyra, cadence]
  - [cadence, carina]
